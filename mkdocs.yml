site_name: incident-py-q
site_description: Contract-driven Python SDK for Incident IQ
site_url: https://example.github.io/incident-py-q/
repo_url: https://github.com/example/incident-py-q
repo_name: example/incident-py-q

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - SDK Usage: sdk-usage.md
  - SDK Reference:
      - Overview: sdk-reference/index.md
      - Silver Overview: sdk-reference/silver.md
      - Apps: sdk-reference/apps.md
      - Alerts: sdk-reference/alerts.md
      - Analytics: sdk-reference/analytics.md
      - Assets: sdk-reference/assets.md
      - Custom Fields: sdk-reference/custom_fields.md
      - Forms: sdk-reference/forms.md
      - Issues: sdk-reference/issues.md
      - Locations: sdk-reference/locations.md
      - Manufacturers: sdk-reference/manufacturers.md
      - Metrics: sdk-reference/metrics.md
      - Notifications: sdk-reference/notifications.md
      - Parts: sdk-reference/parts.md
      - Purchase Orders: sdk-reference/purchaseorders.md
      - SLAs: sdk-reference/slas.md
      - Tickets: sdk-reference/tickets.md
      - Users: sdk-reference/users.md
  - Schema & Validation: schema-validation.md
  - Logging & Runtime: runtime-logging.md
  - API Reference: api-reference.md
  - Project Docs: project-docs.md
  - Changelog: changelog.md
