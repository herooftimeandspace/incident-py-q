name: integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      INCIDENTIQ_TEST_BASE_URL: ${{ secrets.INCIDENTIQ_TEST_BASE_URL }}
      INCIDENTIQ_TEST_API_TOKEN: ${{ secrets.INCIDENTIQ_TEST_API_TOKEN }}
      INCIDENTIQ_TEST_SITE_ID: ${{ secrets.INCIDENTIQ_TEST_SITE_ID }}
      INCIDENTIQ_TEST_CLIENT_HEADER: ${{ secrets.INCIDENTIQ_TEST_CLIENT_HEADER }}
      INCIDENTIQ_TEST_AUTH_MODE: ${{ secrets.INCIDENTIQ_TEST_AUTH_MODE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6  # TODO: pin to specific SHA for reproducibility

      - name: Set up Python
        uses: actions/setup-python@v5  # TODO: pin to specific SHA for reproducibility
        with:
          python-version: "3.14"

      - name: Detect integration secrets
        id: detect
        run: |
          if [ -z "${INCIDENTIQ_TEST_BASE_URL}" ] || [ -z "${INCIDENTIQ_TEST_API_TOKEN}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.detect.outputs.enabled == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run integration tests
        if: steps.detect.outputs.enabled == 'true'
        run: pytest -m integration

      - name: Integration skipped
        if: steps.detect.outputs.enabled != 'true'
        run: echo "Integration secrets are not configured; skipping live tests."
