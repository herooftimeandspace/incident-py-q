name: prepare-release-promotion

on:
  pull_request_target:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: read

jobs:
  prepare-release-promotion:
    name: prepare-release-promotion
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'promote/staging-to-main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_PR_TOKEN: ${{ secrets.PROMOTION_PR_TOKEN }}
      GH_REPO: ${{ github.repository }}
      GH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      GH_PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout promotion branch
        uses: actions/checkout@v6  # TODO: pin to specific SHA for reproducibility
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6  # TODO: pin to specific SHA for reproducibility
        with:
          python-version: "3.14"

      - name: Prepare version bump on promotion branch
        run: |
          set -euo pipefail

          if [ -z "${GH_PR_TOKEN}" ]; then
            echo "PROMOTION_PR_TOKEN is required so release-prep pushes retrigger downstream pull_request workflows."
            exit 1
          fi

          labels="$(gh pr view "${GH_PR_NUMBER}" --repo "${GH_REPO}" --json labels --jq '.labels[].name')"
          semver_labels="$(printf '%s\n' "${labels}" | grep '^semver:' || true)"
          semver_count="$(printf '%s\n' "${semver_labels}" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "${semver_count}" != "1" ]; then
            echo "Expected exactly one semver label on PR #${GH_PR_NUMBER}; found ${semver_count}."
            exit 1
          fi

          part="${semver_labels#semver:}"
          git fetch origin main staging "${GH_HEAD_REF}"
          current_version="$(python -c 'import subprocess, tomllib; print(tomllib.loads(subprocess.check_output(["git", "show", "origin/main:pyproject.toml"], text=True))["project"]["version"])')"
          desired_version="$(python scripts/bump_version.py --part "${part}" --current-version "${current_version}")"

          existing_head_version="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"

          if [ "${existing_head_version}" = "${desired_version}" ] && git merge-base --is-ancestor origin/staging HEAD; then
            echo "Promotion branch already prepared for v${desired_version}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git reset --hard origin/main
          if ! git merge --no-commit --no-ff origin/staging; then
            if git ls-files -u -- .github/workflows/release-prep.yml | grep -q .; then
              git checkout --ours .github/workflows/release-prep.yml
              git add .github/workflows/release-prep.yml
            fi

            unresolved_conflicts="$(git diff --name-only --diff-filter=U)"
            if [ -n "${unresolved_conflicts}" ]; then
              echo "Merge from staging into the promotion branch still has unresolved conflicts:"
              printf '%s\n' "${unresolved_conflicts}"
              exit 1
            fi
          fi

          new_version="$(python scripts/bump_version.py --part "${part}" --write)"
          if [ "${new_version}" != "${desired_version}" ]; then
            echo "Prepared version ${new_version} did not match expected ${desired_version}."
            exit 1
          fi

          git add pyproject.toml src/incident_py_q/version.py
          git commit -m "Prepare release v${new_version} [skip prepare-release-promotion]"
          git push "https://x-access-token:${GH_PR_TOKEN}@github.com/${GH_REPO}.git" HEAD:"${GH_HEAD_REF}" --force
