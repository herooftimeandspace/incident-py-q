name: release-prep

on:
  pull_request_target:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: read

jobs:
  release-prep:
    name: release-prep
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'promote/staging-to-main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      GH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      GH_PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout promotion branch
        uses: actions/checkout@v6  # TODO: pin to specific SHA for reproducibility
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6  # TODO: pin to specific SHA for reproducibility
        with:
          python-version: "3.14"

      - name: Prepare version bump on promotion branch
        run: |
          set -euo pipefail

          labels="$(gh pr view "${GH_PR_NUMBER}" --repo "${GH_REPO}" --json labels --jq '.labels[].name')"
          semver_labels="$(printf '%s\n' "${labels}" | grep '^semver:' || true)"
          semver_count="$(printf '%s\n' "${semver_labels}" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "${semver_count}" != "1" ]; then
            echo "Expected exactly one semver label on PR #${GH_PR_NUMBER}; found ${semver_count}."
            exit 1
          fi

          part="${semver_labels#semver:}"
          git fetch origin main staging "${GH_HEAD_REF}"
          # Read the version from main with a TOML parser instead of shell matching. The
          # release branch may evolve formatting over time, and release-prep must derive the
          # current semantic version from the canonical project metadata rather than relying
          # on a brittle line-oriented regex in bash.
          current_version="$(python -c 'import subprocess, tomllib; print(tomllib.loads(subprocess.check_output(["git", "show", "origin/main:pyproject.toml"], text=True))["project"]["version"])')"
          desired_version="$(python scripts/bump_version.py --part "${part}" --current-version "${current_version}")"

          if [ "$(git log -1 --pretty=%s)" = "Prepare release v${desired_version} [skip release-prep]" ]; then
            echo "Promotion branch already prepared for v${desired_version}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Rebuild the promotion branch from main, then merge staging into it before applying
          # the next version bump. That keeps prior release-prep commits in branch history, so
          # versioned files do not conflict with earlier mainline release commits each time a
          # new staging -> main promotion branch is prepared.
          git reset --hard origin/main
          git merge --no-edit origin/staging
          new_version="$(python scripts/bump_version.py --part "${part}" --write)"
          if [ "${new_version}" != "${desired_version}" ]; then
            echo "Prepared version ${new_version} did not match expected ${desired_version}."
            exit 1
          fi

          git add pyproject.toml src/incident_py_q/version.py
          git commit -m "Prepare release v${new_version} [skip release-prep]"
          git push origin HEAD:"${GH_HEAD_REF}" --force
