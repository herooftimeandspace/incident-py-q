name: release-prep

on:
  pull_request_target:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: read

jobs:
  release-prep:
    name: release-prep
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'promote/staging-to-main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_PR_TOKEN: ${{ secrets.PROMOTION_PR_TOKEN }}
      GH_REPO: ${{ github.repository }}
      GH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      GH_PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout promotion branch
        uses: actions/checkout@v6  # TODO: pin to specific SHA for reproducibility
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6  # TODO: pin to specific SHA for reproducibility
        with:
          python-version: "3.14"

      - name: Prepare version bump on promotion branch
        run: |
          set -euo pipefail

          if [ -z "${GH_PR_TOKEN}" ]; then
            echo "PROMOTION_PR_TOKEN is required so release-prep pushes retrigger downstream pull_request workflows."
            exit 1
          fi

          labels="$(gh pr view "${GH_PR_NUMBER}" --repo "${GH_REPO}" --json labels --jq '.labels[].name')"
          semver_labels="$(printf '%s\n' "${labels}" | grep '^semver:' || true)"
          semver_count="$(printf '%s\n' "${semver_labels}" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "${semver_count}" != "1" ]; then
            echo "Expected exactly one semver label on PR #${GH_PR_NUMBER}; found ${semver_count}."
            exit 1
          fi

          part="${semver_labels#semver:}"
          git fetch origin main staging "${GH_HEAD_REF}"
          # Read the version from main with a TOML parser instead of shell matching. The
          # release branch may evolve formatting over time, and release-prep must derive the
          # current semantic version from the canonical project metadata rather than relying
          # on a brittle line-oriented regex in bash.
          current_version="$(python -c 'import subprocess, tomllib; print(tomllib.loads(subprocess.check_output(["git", "show", "origin/main:pyproject.toml"], text=True))["project"]["version"])')"
          desired_version="$(python scripts/bump_version.py --part "${part}" --current-version "${current_version}")"

          existing_head_version="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"

          # A synchronize event can arrive after release-prep has already rewritten the branch,
          # for example when a human pushes a no-op commit solely to retrigger required PR
          # checks on the prepared promotion head. In that case, rewriting the branch again is
          # counterproductive because the force-push detaches unit/integration/docs runs from
          # the new PR head. If the current branch already carries the desired version and also
          # contains the latest staging tip, treat it as fully prepared and exit without
          # another reset/merge/push cycle.
          if [ "${existing_head_version}" = "${desired_version}" ] && git merge-base --is-ancestor origin/staging HEAD; then
            echo "Promotion branch already prepared for v${desired_version}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Rebuild the promotion branch from main, then merge staging into it before applying
          # the next version bump. That keeps prior release-prep commits in branch history, so
          # versioned files do not conflict with earlier mainline release commits each time a
          # new staging -> main promotion branch is prepared.
          git reset --hard origin/main
          if ! git merge --no-commit --no-ff origin/staging; then
            # release-prep runs from main via pull_request_target, so main's copy of this
            # workflow is the contractual source of truth for how promotions are prepared.
            # When staging still contains an older bootstrap copy of release-prep.yml, prefer
            # main's version for this one file so the promotion branch can be regenerated using
            # the latest documented release behavior. Any other unresolved conflict still means
            # the promotion branch needs manual intervention rather than an automatic override.
            if git ls-files -u -- .github/workflows/release-prep.yml | grep -q .; then
              git checkout --ours .github/workflows/release-prep.yml
              git add .github/workflows/release-prep.yml
            fi

            unresolved_conflicts="$(git diff --name-only --diff-filter=U)"
            if [ -n "${unresolved_conflicts}" ]; then
              echo "Merge from staging into the promotion branch still has unresolved conflicts:"
              printf '%s\n' "${unresolved_conflicts}"
              exit 1
            fi
          fi
          new_version="$(python scripts/bump_version.py --part "${part}" --write)"
          if [ "${new_version}" != "${desired_version}" ]; then
            echo "Prepared version ${new_version} did not match expected ${desired_version}."
            exit 1
          fi

          git add pyproject.toml src/incident_py_q/version.py
          git commit -m "Prepare release v${new_version} [skip release-prep]"
          git push "https://x-access-token:${GH_PR_TOKEN}@github.com/${GH_REPO}.git" HEAD:"${GH_HEAD_REF}" --force
