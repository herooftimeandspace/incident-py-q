name: quality

on:
  push:
    branches: ["main", "staging", "dev"]
  pull_request:

permissions:
  contents: read
  checks: read

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        uses: actions/checkout@v6  # TODO: pin to specific SHA for reproducibility

      - name: Set up Python
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        uses: actions/setup-python@v6  # TODO: pin to specific SHA for reproducibility
        with:
          python-version: "3.14"

      - name: Verify authoritative dev push unit check
        if: github.event_name == 'pull_request' && github.base_ref == 'staging' && github.head_ref == 'dev'
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          check_id="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${PR_HEAD_SHA}/check-runs" \
            --jq '.check_runs[] | select(.name=="unit" and .status=="completed" and .conclusion=="success") | .id' \
            | head -n 1 || true)"

          if [ -z "${check_id}" ]; then
            echo "No successful authoritative unit check was found for dev SHA ${PR_HEAD_SHA}."
            exit 1
          fi

          echo "Authoritative dev push unit check ${check_id} already succeeded for ${PR_HEAD_SHA}."

      - name: Install dependencies
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Install pip-audit
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        run: python -m pip install pip-audit

      - name: Pip Audit
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        run: pip-audit

      - name: Ruff
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        run: ruff check .

      - name: Mypy
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        run: mypy src tests scripts

      - name: Tests (non-integration) with coverage
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        run: pytest --cov=incident_py_q --cov-report=xml --cov-report=term-missing --cov-fail-under=95 -m "not integration"

      - name: Build package wheel
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        run: python -m pip wheel --no-deps --no-build-isolation --wheel-dir dist .

      - name: Build coverage badge payload
        if: github.event_name == 'push'
        run: |
          python scripts/build_badge_json.py coverage \
            --coverage-file coverage.xml \
            --label "coverage ${GITHUB_REF_NAME}" \
            --output coverage-badge.json

      - name: Upload coverage badge artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7  # TODO: pin to specific SHA for reproducibility
        with:
          name: coverage-badge
          path: coverage-badge.json

  publish-badges:
    needs: unit
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6  # TODO: pin to specific SHA for reproducibility

      - name: Download coverage badge artifact
        if: needs.unit.result == 'success'
        uses: actions/download-artifact@v8  # TODO: pin to specific SHA for reproducibility
        with:
          name: coverage-badge
          path: .

      - name: Build unit status badge payload
        run: |
          python scripts/build_badge_json.py status \
            --conclusion "${{ needs.unit.result }}" \
            --label "${GITHUB_REF_NAME} unit" \
            --output unit-status.json

      - name: Publish branch badge JSON to badges branch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --heads "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges | grep -q .; then
            git clone --depth 1 --branch badges "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
            cd badges-work
            git checkout --orphan badges
            git rm -rf .
            mkdir -p branch-coverage branch-status
            touch branch-coverage/.gitkeep branch-status/.gitkeep
            echo "# branch badge payloads" > README.md
            git add README.md branch-coverage/.gitkeep branch-status/.gitkeep
            git commit -m "Initialize badges branch"
            git push origin badges
            cd ..
            rm -rf badges-work
            git clone --depth 1 --branch badges "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
          fi

          mkdir -p "badges-work/branch-status/${GH_BRANCH}"
          cp unit-status.json "badges-work/branch-status/${GH_BRANCH}/unit.json"

          if [ -f coverage-badge.json ]; then
            mkdir -p "badges-work/branch-coverage/${GH_BRANCH}"
            cp coverage-badge.json "badges-work/branch-coverage/${GH_BRANCH}/coverage.json"
          fi

          cd badges-work
          git add "branch-status/${GH_BRANCH}/unit.json"
          if [ -f "branch-coverage/${GH_BRANCH}/coverage.json" ]; then
            git add "branch-coverage/${GH_BRANCH}/coverage.json"
          fi
          if git diff --cached --quiet; then
            echo "No badge changes to publish."
            exit 0
          fi

          git commit -m "Update branch badges for ${GH_BRANCH} [skip ci]"
          git push origin badges
