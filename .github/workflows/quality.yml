name: quality

on:
  push:
    branches: ["main", "staging", "dev"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src tests scripts

      - name: Tests (non-integration) with coverage
        run: pytest --cov=incident_py_q --cov-report=xml --cov-report=term-missing -m "not integration"

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          flags: pytest
          name: pytest-${{ github.ref_name }}
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build package wheel
        run: python -m pip wheel --no-deps --no-build-isolation --wheel-dir dist .

      - name: Build docs
        run: python scripts/build_docs.py
