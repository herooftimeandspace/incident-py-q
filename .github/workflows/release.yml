name: release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6  # TODO: pin to specific SHA for reproducibility
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6  # TODO: pin to specific SHA for reproducibility
        with:
          python-version: "3.14"

      - name: Resolve release label and version from merged PR
        id: semver
        env:
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # release-prep has already written the semver bump onto the promotion branch, so
          # main should already contain the final release version when this workflow starts.
          # Prefer GitHub's associated-pull lookup for normal promotion merges. Keep an
          # explicit fallback to the merge commit subject so the release job can still
          # determine the originating PR during bootstrap or administrator-driven merges,
          # where the commit-to-PR association may not be populated yet.
          pr_number="$(gh api "repos/${GH_REPO}/commits/${GH_SHA}/pulls" --jq '.[0].number' 2>/dev/null || true)"
          if [ -z "${pr_number}" ] || [ "${pr_number}" = "null" ]; then
            merge_subject="$(git log -1 --pretty=%s)"
            if [[ "${merge_subject}" =~ ^Merge\ pull\ request\ \#([0-9]+) ]]; then
              pr_number="${BASH_REMATCH[1]}"
            fi
          fi

          if [ -z "${pr_number}" ] || [ "${pr_number}" = "null" ]; then
            echo "No merged pull request is associated with ${GH_SHA}, and the merge subject did not contain a PR number."
            exit 1
          fi

          labels="$(gh pr view "${pr_number}" --repo "${GH_REPO}" --json labels --jq '.labels[].name')"
          semver_labels="$(printf '%s\n' "${labels}" | grep '^semver:' || true)"
          semver_count="$(printf '%s\n' "${semver_labels}" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "${semver_count}" != "1" ]; then
            echo "Expected exactly one semver label on PR #${pr_number}; found ${semver_count}."
            exit 1
          fi

          part="${semver_labels#semver:}"
          # Use TOML parsing for both the current checkout and the previous main commit so the
          # release flow follows the canonical project metadata instead of depending on shell
          # regex extraction that can silently return an empty string.
          current_version="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
          previous_version="$(python -c 'import subprocess, tomllib; print(tomllib.loads(subprocess.check_output(["'"'"'git'"'"', "'"'"'show'"'"', "'"'"'HEAD^1:pyproject.toml'"'"'"], text=True))["'"'"'project'"'"'"]["'"'"'version'"'"'"])')"
          expected_version="$(python scripts/bump_version.py --part "${part}" --current-version "${previous_version}")"

          if [ "${current_version}" != "${expected_version}" ]; then
            echo "Expected release version ${expected_version}, but repository version is ${current_version}."
            exit 1
          fi

          echo "part=${part}" >> "${GITHUB_OUTPUT}"
          echo "version=${current_version}" >> "${GITHUB_OUTPUT}"

      - name: Stop if the GitHub Release already exists
        id: existing_release
        env:
          RELEASE_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          if gh release view "v${RELEASE_VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release v${RELEASE_VERSION} already exists; skipping."
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "exists=false" >> "${GITHUB_OUTPUT}"

      - name: Install build dependencies
        if: steps.existing_release.outputs.exists != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build release artifacts
        if: steps.existing_release.outputs.exists != 'true'
        env:
          RELEASE_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          python -m build
          git archive --format=zip --output "dist/incident-py-q-${RELEASE_VERSION}.zip" HEAD

      - name: Create GitHub Release
        if: steps.existing_release.outputs.exists != 'true'
        env:
          RELEASE_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          gh release create "v${RELEASE_VERSION}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "v${RELEASE_VERSION}" \
            --generate-notes \
            --target "$(git rev-parse HEAD)"
